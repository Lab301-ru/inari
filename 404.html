<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<title>Страница не найдена — Ателье Инари</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, follow" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Manrope:wght@300;400&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: #14110D;
    color: #F4F1EA;
    font-family: "Manrope", system-ui, sans-serif;
    font-weight: 300;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    padding: 40px 24px;
  }
  .num {
    font-family: "Cormorant Garamond", serif;
    font-weight: 300;
    font-size: clamp(120px, 25vw, 220px);
    line-height: 1;
    color: #C9A84C;
    opacity: 0.18;
    letter-spacing: -0.04em;
    user-select: none;
  }
  h1 {
    font-family: "Cormorant Garamond", serif;
    font-weight: 300;
    font-style: italic;
    font-size: clamp(28px, 5vw, 48px);
    margin-top: -20px;
    margin-bottom: 16px;
    letter-spacing: -0.01em;
  }
  p {
    font-size: 15px;
    color: rgba(244,241,234,0.55);
    letter-spacing: 0.02em;
    margin-bottom: 48px;
    max-width: 360px;
  }
  a.btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 36px;
    border-radius: 999px;
    border: 1px solid rgba(201,168,76,0.5);
    color: #C9A84C;
    text-decoration: none;
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    transition: border-color 300ms, color 300ms, background 300ms;
  }
  a.btn:hover {
    background: rgba(201,168,76,0.08);
    border-color: #C9A84C;
  }
  .footer-note {
    margin-top: 80px;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(244,241,234,0.2);
  }
</style>
</head>
<body>
  <div class="num">404</div>
  <h1>Страница не найдена</h1>
  <p>Возможно, адрес изменился или страница была удалена. Вернитесь на главную.</p>
  <a class="btn" href="/">← На главную</a>
  <div class="footer-note">Ателье Инари · Воронеж</div>
</body>
</html>
